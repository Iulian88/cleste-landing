<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark green background, rounded square -->
  <rect width="512" height="512" rx="80" fill="#1B5E20"/>

  <!-- Tapener body (main horizontal block) -->
  <rect x="76" y="196" width="286" height="104" rx="18" fill="white"/>

  <!-- Handle (rounded rect below left side of body) -->
  <rect x="88" y="274" width="64" height="148" rx="32" fill="white"/>

  <!-- Tape roll indicator inside body (donut) -->
  <circle cx="215" cy="248" r="38" fill="#1B5E20"/>
  <circle cx="215" cy="248" r="20" fill="white"/>

  <!-- Binding ring at nose -->
  <circle cx="390" cy="248" r="56" fill="none" stroke="white" stroke-width="34"/>

  <!-- Plant stem going through the ring (above) -->
  <line x1="390" y1="108" x2="390" y2="192" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- Plant stem going through the ring (below) -->
  <line x1="390" y1="304" x2="390" y2="388" stroke="white" stroke-width="14" stroke-linecap="round"/>

  <!-- Small leaf attached to stem (simple filled ellipse at angle) -->
  <ellipse cx="418" cy="136" rx="36" ry="17" fill="white" transform="rotate(-35 418 136)"/>
</svg>
